<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Statistics & Assessment Study Guide</title>

  <!-- Favicon -->
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js + plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #f9fafb;
    }
    #root {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
    }
    /* Floating debug button (only added when ?debug=1) */
    .dbg-btn {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 99999;
      padding: 8px 12px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0,0,0,.2);
      opacity: .85;
    }
    .dbg-btn:active { transform: translateY(1px); }
  </style>

  <!-- Minimal diagnostics (no overlays by default) -->
  <script>
    console.log('%c🔍 index.html loaded', 'color:dodgerblue;font-weight:bold;');
    window.addEventListener('error', e => {
      console.error('❌ JS Error:', e.message, '\n', e.filename, e.lineno + ':' + e.colno);
    });
    window.addEventListener('unhandledrejection', e => {
      console.error('💥 Unhandled promise rejection:', e.reason);
    });
  </script>
</head>

<body>
  <div id="root">Loading study guide...</div>

  <!-- Globals used by chart modules -->
  <script>
    window.chartRegistry = {};
    window.registerChart = function (type, renderFunction) {
      window.chartRegistry[type] = renderFunction;
      console.log('✅ Registered chart:', type);
    };

    // Fallback if app doesn't boot
    setTimeout(() => {
      const root = document.getElementById('root');
      if (root && root.innerText.includes('Loading')) {
        console.warn('⚠️ App did not initialize within 3s.');
        root.style.color = 'red';
        root.innerText = '⚠️ App failed to render. Check console for errors.';
      }
    }, 3000);
  </script>

  <!-- Chart utilities and chart definitions -->
  <script src="./src/chartUtils.js" defer></script>
  <script src="./src/charts/index.js" defer></script>
  <script src="./src/charts/normalDistribution.js" defer></script>
  <script src="./src/charts/skewedDistribution.js" defer></script>
  <script src="./src/charts/correlation.js" defer></script>
  <script src="./src/charts/standardizedScores.js" defer></script>
  <script src="./src/charts/centralTendency.js" defer></script>
  <script src="./src/charts/ordinalScores.js" defer></script>
  <script src="./src/charts/bubbleChart.js" defer></script>
  <script src="./src/charts/testRetest.js" defer></script>
  <script src="./src/charts/internalConsistency.js" defer></script>
  <script src="./src/charts/alternateForms.js" defer></script>

  <!-- App (classic). Loads before data so the event listener is ready -->
  <script src="./app.js" defer></script>

  <!-- Data bridge (ES module) -->
  <script type="module" src="./src/data/index.js"></script>

  <!-- 🧪 Tablet-friendly debug console: hidden by default; toggle with button -->
  <script>
    (function(){
      if (!location.search.includes('debug=1')) return;

      // add a floating toggle button
      const btn = document.createElement('button');
      btn.className = 'dbg-btn';
      btn.textContent = 'Console';
      btn.title = 'Toggle debug console';
      document.body.appendChild(btn);

      // load eruda, keep hidden initially
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda';
      s.onload = () => {
        eruda.init();
        eruda.hide(); // start hidden
        console.log('%c🧩 Eruda ready (hidden)', 'color:limegreen;font-weight:bold;');

        let shown = false;
        const applyPadding = (on) => {
          document.body.style.paddingBottom = on ? '220px' : '';
          document.documentElement.style.scrollPaddingBottom = on ? '220px' : '';
        };

        btn.onclick = () => {
          shown = !shown;
          if (shown) {
            eruda.show();
            // keep it docked at the bottom
            const root = document.querySelector('#eruda');
            if (root) root.style.transform = 'translateY(0)';
            applyPadding(true);
          } else {
            eruda.hide();
            applyPadding(false);
          }
        };
      };
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
